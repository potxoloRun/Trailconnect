    <script>
        // 1. Iniciar mapa (Coordenadas: [Latitud, Longitud], Zoom: 12)
        // He puesto las coordenadas del Lago de Sanabria como ejemplo
        var map = L.map('map').setView([42.1245, -6.7056], 12);

        // 2. Cargar el dibujo del mapa (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
    </script>
